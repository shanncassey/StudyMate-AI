<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyMate AI</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="app">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <h3>Chat History</h3>
      <div id="chatList" class="chat-list"></div>

      <div class="sidebar-footer">
        <button onclick="clearAllChats()" class="sidebar-btn danger">
          <span class="sidebar-btn-text">Clear Chat History</span>
        </button>
      </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">

      <!-- HEADER -->
      <div class="header">

        <div class="brand">
          <img src="Logo.jpg" class="logo" alt="logo">
          <h2>StudyMate AI</h2>
        </div>

        <div class="header-actions">

          <!-- NEW CHAT TOGGLE -->
          <button onclick="clearChat()" class="icon-btn" title="New Chat">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
              <line x1="9" y1="10" x2="15" y2="10"></line>
              <line x1="12" y1="7" x2="12" y2="13"></line>
            </svg>
          </button>

          <!-- THEME TOGGLE -->
          <button onclick="toggleTheme()" class="icon-btn" title="Toggle Theme">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
          </button>

          <!-- SIDEBAR TOGGLE -->
          <button onclick="toggleSidebar()" class="icon-btn" title="Toggle Sidebar">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="16" rx="2"></rect>
              <path d="M9 4v16"></path>
              <path d="M6 9l-2 3 2 3"></path>
            </svg>
          </button>

        </div>

      </div>

      <!-- CHAT -->
      <div class="chat-container" id="chatContainer"></div>

      <!-- INPUT -->
      <div class="input-wrapper">

        <div class="prompt-controls">

          <div class="control-group">
            <select id="modeSelect">
              <option disabled selected>Mode</option>
              <option value="explain">Explain</option>
              <option value="summary">Summary</option>
              <option value="step-by-step">Step-by-step</option>
              <option value="quiz">Quiz me</option>
            </select>
          </div>

          <div class="control-group">
            <select id="styleSelect">
              <option disabled selected>Style</option>
              <option value="simple">Simple</option>
              <option value="detailed">Detailed</option>
            </select>
          </div>

          <div class="control-group">
            <select id="languageSelect">
              <option disabled selected>Language</option>
              <option value="auto">Auto Language</option>
              <option value="english">English</option>
              <option value="filipino">Filipino</option>
              <option value="taglish">Taglish</option>
            </select>
          </div>

        </div>

        <div class="input-area">
          <input type="text" id="userInput" placeholder="Ask a study-related question...">
          <button onclick="sendMessage()">Send</button>
        </div>

      </div>

    </div>
  </div>

  <script src="script.js"></script>

</body>

</html>
